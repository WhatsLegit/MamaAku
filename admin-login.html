<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Mama Aku</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7f5;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(139,195,74,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(139,195,74,0.06) 0%, transparent 60%);
    }

    .admin-login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .admin-login-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }

    .admin-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .admin-logo .shield {
      width: 64px;
      height: 64px;
      background: rgba(139,195,74,0.12);
      border: 1.5px solid rgba(139,195,74,0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      color: #6a9e30;
    }

    .admin-logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .admin-logo p {
      font-size: 0.85rem;
      color: #999;
      margin-top: 4px;
    }

    .error-msg {
      display: none;
      background: rgba(231,76,60,0.08);
      border: 1px solid rgba(231,76,60,0.2);
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 1.2rem;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #6a9e30; }
    .back-link i { margin-right: 5px; }
  </style>
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="admin-logo">
        <div class="shield"><i class="fas fa-shield-alt"></i></div>
        <h1>Admin Access</h1>
        <p>Mama Aku Wellness Hub</p>
      </div>

      <div class="error-msg" id="admin-error"></div>

      <form id="admin-login-form">
        <div class="form-group">
          <label><i class="fas fa-envelope" style="color:#7ab535;margin-right:6px;"></i>Admin Email</label>
          <input type="email" id="admin-email" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock" style="color:#7ab535;margin-right:6px;"></i>Password</label>
          <input type="password" id="admin-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;margin-top:0.5rem;">
          <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Sign In to Dashboard
        </button>
      </form>

      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>Back to website
      </a>
    </div>
  </div>

  <script type="module">
    import { adminLogin } from './js/firebase.js';

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const errorEl = document.getElementById('admin-error');
      errorEl.style.display = 'none';

      btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Verifying...';
      btn.disabled = true;

      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      const result = await adminLogin(email, password);
      if (result.success) {
        // Add a small delay to ensure persistence writes complete on iOS
        setTimeout(() => { window.location.href = 'admin.html'; }, 200);
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Sign In to Dashboard';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
