<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Mama Aku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="logo.svg" alt="Mama Aku Logo" style="height:44px;width:auto;">
      </a>
      <div class="nav-right">
        <div class="auth-links"></div>
      </div>
    </div>
    <div class="nav-links-row">
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="business.html">Business</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section style="min-height:100vh;display:flex;align-items:center;padding:6rem 0 3rem;">
    <div class="container">
      <div class="glass" style="max-width:440px;margin:0 auto;padding:2.5rem;">
        <div style="text-align:center;margin-bottom:2rem;">
          <div style="width:52px;height:52px;background:rgba(139,195,74,0.12);border:1.5px solid rgba(139,195,74,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.4rem;color:#6a9e30;">
            <i class="fas fa-user-plus"></i>
          </div>
          <h2 style="font-size:1.5rem;color:#1a1a1a;">Create Account</h2>
          <p style="color:#aaa;font-size:0.88rem;margin-top:4px;">Join the Mama Aku wellness community</p>
        </div>

        <div id="signup-error" style="display:none;background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);color:#c0392b;padding:10px 14px;border-radius:10px;font-size:0.88rem;margin-bottom:1.2rem;"></div>

        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label><i class="fas fa-envelope" style="color:#7ab535;margin-right:6px;"></i>Email Address</label>
            <input id="signup-email" type="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone" style="color:#7ab535;margin-right:6px;"></i>Phone Number</label>
            <input id="signup-phone" type="tel" placeholder="e.g. 0244573792" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock" style="color:#7ab535;margin-right:6px;"></i>Password</label>
            <input id="signup-password" type="password" placeholder="Min. 6 characters" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;">
            Create Account
          </button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:#aaa;">
          Already have an account? <a href="login.html" style="color:#6a9e30;font-weight:600;">Login</a>
        </p>
      </div>
    </div>
  </section>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
