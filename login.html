<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mama Aku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="logo.svg" alt="Mama Aku Logo" style="height:44px;width:auto;">
      </a>
      <div class="nav-right">
        <div class="auth-links"></div>
      </div>
    </div>
    <div class="nav-links-row">
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="business.html">Business</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section style="min-height:100vh;display:flex;align-items:center;padding:6rem 0 3rem;">
    <div class="container">
      <div class="glass" style="max-width:420px;margin:0 auto;padding:2.5rem;">
        <div style="text-align:center;margin-bottom:2rem;">
          <div style="width:52px;height:52px;background:rgba(139,195,74,0.12);border:1.5px solid rgba(139,195,74,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.4rem;color:#6a9e30;">
            <i class="fas fa-sign-in-alt"></i>
          </div>
          <h2 style="font-size:1.5rem;color:#1a1a1a;">Welcome Back</h2>
          <p style="color:#aaa;font-size:0.88rem;margin-top:4px;">Sign in to your account</p>
        </div>

        <div id="login-error" style="display:none;background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);color:#c0392b;padding:10px 14px;border-radius:10px;font-size:0.88rem;margin-bottom:1.2rem;"></div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label><i class="fas fa-envelope" style="color:#7ab535;margin-right:6px;"></i>Email Address</label>
            <input id="login-email" type="email" placeholder="your@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock" style="color:#7ab535;margin-right:6px;"></i>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;">
            Login
          </button>
        </form>

        <p style="text-align:center;margin-top:1rem;font-size:0.88rem;color:#aaa;">
          <a href="#" onclick="showModal('reset-modal');return false;" style="color:#6a9e30;">Forgot Password?</a>
          &nbsp;·&nbsp;
          <a href="signup.html" style="color:#6a9e30;font-weight:600;">Create Account</a>
        </p>
      </div>
    </div>
  </section>

  <!-- Reset Modal -->
  <div id="reset-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('reset-modal')">&times;</span>
      <h3 style="margin-bottom:1.2rem;">Reset Password</h3>
      <form onsubmit="handleResetPassword(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input id="reset-email" type="email" placeholder="your@email.com" required>
        </div>
        <p id="reset-success" style="display:none;color:#6a9e30;font-size:0.88rem;margin-bottom:1rem;">
          <i class="fas fa-check-circle"></i> Reset link sent! Check your email.
        </p>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
